<![CDATA[<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Automated Banking</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card fade-in">
      <div class="auth-header">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem;">
          <div class="sidebar-logo-icon">🏦</div>
          Automated Banking
        </a>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to access your account</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
        </div>

        <div class="flex justify-between items-center" style="margin-bottom: 1.25rem;">
          <label class="form-check">
            <input type="checkbox" id="remember">
            <span style="font-size: 0.875rem;">Remember me</span>
          </label>
          <a href="#" style="font-size: 0.875rem;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-accent btn-lg" style="width: 100%;">
          Sign In
        </button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="grid grid-2" style="gap: 1rem;">
        <button class="btn btn-outline" style="width: 100%;">
          <span>🌐</span> Google
        </button>
        <button class="btn btn-outline" style="width: 100%;">
          <span>📘</span> Facebook
        </button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>

      <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
        <p class="text-muted" style="font-size: 0.8125rem; text-align: center; margin-bottom: 0.5rem;">
          🔐 Administrator Access
        </p>
        <a href="admin/index.html" class="btn btn-outline" style="width: 100%;">
          Admin Portal Login
        </a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Check if user exists
      const users = JSON.parse(localStorage.getItem('automatedBankUsers') || '[]');
      const user = users.find(u => u.email === email);
      
      if (user) {
        // Save current user
        localStorage.setItem('currentUser', JSON.stringify(user));
        // Redirect to dashboard
        window.location.href = 'user/dashboard.html';
      } else {
        // Demo: Create a test user if none exists
        const testUser = {
          firstName: 'Demo',
          lastName: 'User',
          email: email,
          phone: '08012345678',
          accountId: 'AUT-DEMO1',
          accountNumber: '0123456789',
          bankName: 'MONNIFY - WEMA BANK',
          balance: 50000,
          status: 'active',
          kycStatus: 'verified',
          createdAt: new Date().toISOString()
        };
        
        localStorage.setItem('currentUser', JSON.stringify(testUser));
        window.location.href = 'user/dashboard.html';
      }
    });
  </script>
</body>
</html>
]]>
