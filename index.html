<![CDATA[<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Automated Banking</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .admin-login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .admin-login-card {
      width: 100%;
      max-width: 450px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 2.5rem;
    }
    
    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(156, 39, 176, 0.2);
      border: 1px solid rgba(156, 39, 176, 0.3);
      border-radius: 999px;
      font-size: 0.75rem;
      color: #ba68c8;
      margin-bottom: 1.5rem;
    }
    
    .admin-features {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
    }
    
    .admin-feature-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    
    .admin-feature-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
    
    .admin-feature-item span {
      color: var(--success-color);
    }
  </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
  <div class="admin-login-container">
    <div class="admin-login-card fade-in">
      <div class="auth-header">
        <a href="../index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem;">
          <div class="sidebar-logo-icon">🏦</div>
          Automated Banking
        </a>
        <div class="admin-badge">
          🔐 ADMINISTRATOR PORTAL
        </div>
        <h1 class="auth-title">Admin Sign In</h1>
        <p class="auth-subtitle">Access the administration dashboard</p>
      </div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" class="form-control" id="adminEmail" placeholder="Enter admin email" required value="admin@automatedbank.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="adminPassword" placeholder="Enter password" required value="admin123">
        </div>

        <div class="form-group">
          <label class="form-label">Two-Factor Code</label>
          <input type="text" class="form-control" id="otpCode" placeholder="Enter 6-digit code" maxlength="6" value="123456">
          <span class="form-hint">Demo code: 123456</span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
          Sign In to Admin Portal
        </button>
      </form>

      <div class="admin-features">
        <h4 style="font-size: 0.875rem; margin-bottom: 1rem; color: var(--text-secondary);">Dashboard Features</h4>
        <div class="admin-feature-list">
          <div class="admin-feature-item"><span>✓</span> Transaction Monitoring</div>
          <div class="admin-feature-item"><span>✓</span> Fraud Detection</div>
          <div class="admin-feature-item"><span>✓</span> KYC/AML Compliance</div>
          <div class="admin-feature-item"><span>✓</span> User Management</div>
          <div class="admin-feature-item"><span>✓</span> Risk Scoring</div>
          <div class="admin-feature-item"><span>✓</span> Audit Logs</div>
        </div>
      </div>

      <div class="auth-footer">
        <a href="../login.html" style="font-size: 0.875rem;">← Back to User Login</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const otp = document.getElementById('otpCode').value;
      
      // Demo validation
      if (email && password && otp === '123456') {
        const adminUser = {
          name: 'System Administrator',
          email: email,
          role: 'super_admin',
          permissions: ['all'],
          lastLogin: new Date().toISOString()
        };
        localStorage.setItem('adminUser', JSON.stringify(adminUser));
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid credentials. Use demo code: 123456');
      }
    });
  </script>
</body>
</html>
]]>
